name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check all imports
        run: |
          python -c "
          import pandas, numpy, sklearn, xgboost
          import lightgbm, shap, mlflow
          import fastapi, streamlit, joblib
          print('All imports OK')
          "

      - name: Lint src files
        run: |
          python -m py_compile src/features.py
          python -m py_compile src/preprocessing.py
          python -m py_compile src/train.py
          python -m py_compile src/explain.py
          python -m py_compile api/main.py
          echo "All files compile clean"
